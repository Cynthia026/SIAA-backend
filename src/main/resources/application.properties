# ===================================
# CONFIGURACION DE LA APLICACION
# ===================================
spring.application.name=siaa_control_asistencia

# ===================================
# CONFIGURACION DEL SERVIDOR
# ===================================
server.port=${PORT:8081}
server.servlet.context-path=/api

# ===================================
# CONFIGURACION DE MYSQL - AWS RDS
# ===================================
spring.datasource.url=jdbc:mysql://siaa-db.czrpciwkwhvg.us-east-1.rds.amazonaws.com:3306/siaa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=truespring.datasource.username=admin
spring.datasource.password=Admin2026_AWS
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# CONFIGURACION DE JPA/HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================
# CONFIGURACION DE JWT
# ===================================
app.jwt.secret=SiaaSecretKeyParaJWT2026MuySeguraYLargaDeAlMenos256BitsParaHS512
app.jwt.expiration=86400000

# ===================================
# CONFIGURACION DE CORS
# ===================================
app.cors.allowed-origins=*

# ===================================
# CONFIGURACION DE LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.example=DEBUG