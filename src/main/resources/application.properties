app.jwt.expiration=86400000

# ===================================
# CONFIGURACIėN DE CORS
# ===================================
app.cors.allowed-origins=*

# ===================================
# CONFIGURACIėN DE LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.example.siaa_control_asistencia=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===================================
# CONFIGURACIėN DE MULTIPART
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# CONFIGURACIėN DE JACKSON
# ===================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Mexico_City

# ===================================
# CONFIGURACIėN DE SPRING BOOT
# ===================================
spring.main.allow-bean-definition-overriding=true